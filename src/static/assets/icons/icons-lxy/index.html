<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标素材库 - icons-lxy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #333333;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      text-align: center;
      padding: 32px 0 24px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .auto-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: #ecfdf5;
      color: #059669;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .auto-badge .dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .search-bar {
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      height: 40px;
      padding: 0 16px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: #4d7cfe;
    }

    .color-picker {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .color-picker label {
      font-size: 13px;
      color: #666;
    }

    .color-option {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }

    .color-option.active {
      border-color: #4d7cfe;
      transform: scale(1.1);
    }

    .refresh-btn {
      padding: 0 16px;
      height: 40px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .refresh-btn:hover {
      background: #e5e7eb;
    }

    .refresh-btn:active {
      transform: scale(0.97);
    }

    .category-section {
      margin-bottom: 32px;
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .category-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .category-count {
      font-size: 13px;
      color: #999;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    @media (max-width: 900px) {
      .icon-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 600px) {
      .icon-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .icon-item:hover {
      background: #f5f7fb;
    }

    .icon-item:active {
      background: #e8edf5;
    }

    .icon-svg {
      width: 48px;
      height: 48px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-svg svg {
      width: 100%;
      height: 100%;
    }

    .icon-label {
      font-size: 13px;
      color: #333;
      text-align: center;
      line-height: 1.3;
    }

    .icon-filename {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
      text-align: center;
      word-break: break-all;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: #999;
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #4d7cfe;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: #999;
    }

    .empty-state .emoji {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
    }

    .error-state {
      text-align: center;
      padding: 40px 20px;
      background: #fef2f2;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .error-state .emoji {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .error-state p {
      font-size: 14px;
      color: #dc2626;
      margin-bottom: 8px;
    }

    .error-state .hint {
      font-size: 12px;
      color: #991b1b;
    }

    .error-state code {
      background: #fee2e2;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .toast.show {
      opacity: 1;
    }

    .footer {
      text-align: center;
      padding: 24px 0;
      color: #ccc;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>图标素材库</h1>
      <p>
        icons-lxy
        <span class="auto-badge"><span class="dot"></span>自动扫描</span>
        · 共 <span id="total-count">0</span> 个图标
      </p>
    </div>

    <div id="error-container"></div>

    <div class="search-bar">
      <input type="text" id="search-input" class="search-input" placeholder="搜索图标名称...">
      <div class="color-picker">
        <label>颜色:</label>
        <div class="color-option active" data-color="#333333" style="background: #333333;" title="默认黑"></div>
        <div class="color-option" data-color="#4d7cfe" style="background: #4d7cfe;" title="主题蓝"></div>
        <div class="color-option" data-color="#f43f5e" style="background: #f43f5e;" title="上涨红"></div>
        <div class="color-option" data-color="#22c55e" style="background: #22c55e;" title="下跌绿"></div>
        <div class="color-option" data-color="#9ca3af" style="background: #9ca3af;" title="灰色"></div>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="scanIcons()">
        <span>🔄</span> 刷新图标
      </button>
    </div>

    <div id="icons-container">
      <div class="loading">
        <div class="spinner"></div>
        <p>正在扫描图标文件...</p>
      </div>
    </div>

    <div class="footer">
      点击图标复制文件名 · 新增 SVG 文件后点击刷新或按 F5 自动显示
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentColor = '#333333';
    let searchKeyword = '';
    let allIcons = [];

    // 从文件名生成中文标签
    function getLabelFromFilename(filename) {
      const name = filename.replace('.svg', '');
      const parts = name.split('-');
      
      const labelMap = {
        'quote-up': '上涨',
        'quote-down': '下跌',
        'quote-kline': 'K线',
        'quote-volume': '成交量',
        'quote-flat': '平盘',
        'action-search': '搜索',
        'action-filter': '筛选',
        'action-star': '收藏',
        'action-share': '分享',
        'action-refresh': '刷新',
        'action-setting': '设置',
        'action-edit': '编辑',
        'action-delete': '删除',
        'action-add': '添加',
        'action-close': '关闭',
        'action-check': '确认',
        'action-test': '测试',
        'alert-warming': '预警',
        'alert-flash': '异动',
        'alert-push': '推送',
        'alert-notice': '通知',
        'alert-bell': '铃铛',
        'nav-home': '首页',
        'nav-quote': '行情',
        'nav-user': '我的',
        'nav-news': '资讯',
        'nav-discover': '发现',
        'nav-morning': '早点听',
        'analysis-briefing': '晨报',
        'analysis-earnings': '业绩',
        'analysis-event': '事件',
        'analysis-valuation': '估值',
        'analysis-report': '研报',
      };

      if (labelMap[name]) return labelMap[name];
      return parts[parts.length - 1] || name;
    }

    // 根据文件名前缀分类
    function getCategoryFromFilename(filename) {
      if (filename.startsWith('quote-')) return { key: 'quote', name: '行情类' };
      if (filename.startsWith('action-')) return { key: 'action', name: '功能类' };
      if (filename.startsWith('alert-')) return { key: 'alert', name: '提醒类' };
      if (filename.startsWith('nav-')) return { key: 'nav', name: '导航类' };
      if (filename.startsWith('analysis-')) return { key: 'analysis', name: '分析类' };
      return { key: 'other', name: '其他' };
    }

    // 通过 API 扫描图标
    async function scanIcons() {
      document.getElementById('icons-container').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>正在扫描图标文件...</p>
        </div>
      `;
      document.getElementById('error-container').innerHTML = '';

      try {
        const response = await fetch('/api/icons');
        const data = await response.json();
        
        if (data.success && data.icons) {
          processIcons(data.icons);
        } else {
          throw new Error(data.error || '未知错误');
        }
      } catch (err) {
        console.error('扫描图标失败:', err);
        showError(err.message);
      }
    }

    // 处理图标数据
    function processIcons(svgFiles) {
      svgFiles = svgFiles.filter(f => f.endsWith('.svg'));
      svgFiles.sort();

      allIcons = svgFiles.map(file => {
        const category = getCategoryFromFilename(file);
        return {
          file: file,
          label: getLabelFromFilename(file),
          category: category.key,
          categoryName: category.name,
        };
      });

      document.getElementById('total-count').textContent = allIcons.length;
      renderIcons();
    }

    // 显示错误
    function showError(msg) {
      const errorEl = document.getElementById('error-container');
      errorEl.innerHTML = `
        <div class="error-state">
          <div class="emoji">⚠️</div>
          <p>自动扫描失败: ${msg}</p>
          <p class="hint">请确保使用 server.py 启动服务器</p>
          <p class="hint">运行命令：<code>python server.py</code></p>
        </div>
      `;
      
      document.getElementById('icons-container').innerHTML = `
        <div class="empty-state">
          <div class="emoji">📁</div>
          <p>无法加载图标</p>
        </div>
      `;
    }

    // 渲染图标
    function renderIcons() {
      const container = document.getElementById('icons-container');
      const keyword = searchKeyword.toLowerCase().trim();

      const filtered = allIcons.filter(icon => {
        if (!keyword) return true;
        return icon.file.toLowerCase().includes(keyword) ||
               icon.label.toLowerCase().includes(keyword) ||
               icon.categoryName.toLowerCase().includes(keyword);
      });

      const grouped = {};
      const categoryOrder = ['quote', 'action', 'alert', 'nav', 'analysis', 'other'];
      const categoryNames = {
        quote: '行情类',
        action: '功能类',
        alert: '提醒类',
        nav: '导航类',
        analysis: '分析类',
        other: '其他',
      };

      filtered.forEach(icon => {
        if (!grouped[icon.category]) {
          grouped[icon.category] = [];
        }
        grouped[icon.category].push(icon);
      });

      let html = '';
      let totalVisible = 0;

      categoryOrder.forEach(catKey => {
        if (!grouped[catKey] || grouped[catKey].length === 0) return;
        totalVisible += grouped[catKey].length;

        html += `
          <div class="category-section">
            <div class="category-header">
              <span class="category-name">${categoryNames[catKey]}</span>
              <span class="category-count">${grouped[catKey].length} 个</span>
            </div>
            <div class="icon-grid">
              ${grouped[catKey].map(icon => `
                <div class="icon-item" data-file="${icon.file}" data-label="${icon.label}">
                  <div class="icon-svg" data-src="${icon.file}"></div>
                  <div class="icon-label">${icon.label}</div>
                  <div class="icon-filename">${icon.file}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      if (totalVisible === 0) {
        html = `
          <div class="empty-state">
            <div class="emoji">🔍</div>
            <p>没有找到匹配的图标</p>
          </div>
        `;
      }

      container.innerHTML = html;
      loadSVGIcons();
    }

    // 加载 SVG 并应用颜色
    function loadSVGIcons() {
      const iconSvgs = document.querySelectorAll('.icon-svg[data-src]');
      
      iconSvgs.forEach(el => {
        const src = el.getAttribute('data-src');
        fetch(src)
          .then(res => res.text())
          .then(svgText => {
            let coloredSvg = svgText;
            
            coloredSvg = coloredSvg.replace(
              /fill="(?!none\b)[^"]*"/g,
              `fill="${currentColor}"`
            );
            
            coloredSvg = coloredSvg.replace(
              /stroke="(?!none\b)[^"]*"/g,
              `stroke="${currentColor}"`
            );
            
            el.innerHTML = coloredSvg;
          })
          .catch(() => {
            el.innerHTML = `<span style="color:#ddd;font-size:12px;">加载失败</span>`;
          });
      });
    }

    // 搜索
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchKeyword = e.target.value;
      renderIcons();
    });

    // 颜色切换
    document.querySelectorAll('.color-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
        option.classList.add('active');
        currentColor = option.getAttribute('data-color');
        loadSVGIcons();
      });
    });

    // 点击复制
    document.getElementById('icons-container').addEventListener('click', (e) => {
      const item = e.target.closest('.icon-item');
      if (!item) return;
      
      const file = item.getAttribute('data-file');
      const label = item.getAttribute('data-label');
      
      const nameWithoutExt = file.replace('.svg', '');
      navigator.clipboard.writeText(nameWithoutExt).then(() => {
        showToast(`已复制: ${label} (${nameWithoutExt})`);
      }).catch(() => {
        showToast(`已复制: ${label} (${nameWithoutExt})`);
      });
    });

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 1500);
    }

    // 初始化
    scanIcons();
  </script>
</body>
</html>
